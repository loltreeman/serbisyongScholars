{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Service Log - serbisyongScholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    {% include 'partials/navbar.html' %}

    <main class="max-w-2xl mx-auto px-4 py-8">

        <div class="mb-8">
            <a href="/admin/dashboard/" class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1 mb-4">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back to Dashboard
            </a>
            <h1 class="text-3xl font-bold text-gray-900">Add Service Log</h1>
            <p class="text-gray-600 mt-1">Encode service hours rendered by a scholar</p>
        </div>

        <div id="success-message" class="hidden mb-6 bg-green-50 border border-green-200 rounded-lg p-4 flex items-center gap-3">
            <svg class="w-5 h-5 text-green-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-green-800 font-medium">Service log added successfully!</p>
        </div>

        <div id="error-message" class="hidden mb-6 bg-red-50 border border-red-200 rounded-lg p-4 flex items-center gap-3">
            <svg class="w-5 h-5 text-red-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p id="error-text" class="text-red-800 font-medium">Something went wrong.</p>
        </div>

        <div class="bg-white rounded-lg shadow p-6 border border-gray-100">
            <div class="space-y-6">

                <div>
                    <label for="student-id" class="block text-sm font-medium text-gray-700 mb-1">
                        Student ID <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        id="student-id"
                        maxlength="6"
                        placeholder="e.g. 123456"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    />
                    <p id="student-id-error" class="hidden text-red-500 text-xs mt-1"></p>
                </div>

                <div>
                    <label for="date-rendered" class="block text-sm font-medium text-gray-700 mb-1">
                        Date Rendered <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="date"
                        id="date-rendered"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    />
                    <p id="date-error" class="hidden text-red-500 text-xs mt-1"></p>
                </div>

                <div>
                    <label for="hours" class="block text-sm font-medium text-gray-700 mb-1">
                        Number of Hours <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="number"
                        id="hours"
                        min="0.5"
                        max="24"
                        step="0.5"
                        placeholder="e.g. 2.5"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    />
                    <p id="hours-error" class="hidden text-red-500 text-xs mt-1"></p>
                </div>

                <div>
                    <label for="office" class="block text-sm font-medium text-gray-700 mb-1">
                        Office Assigned <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        id="office"
                        maxlength="200"
                        placeholder="e.g. Office of Admissions and Aid"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    />
                    <p id="office-error" class="hidden text-red-500 text-xs mt-1"></p>
                </div>

                <div>
                    <label for="activity" class="block text-sm font-medium text-gray-700 mb-1">
                        Activity Description <span class="text-red-500">*</span>
                    </label>
                    <textarea
                        id="activity"
                        rows="3"
                        placeholder="Brief description of the activity performed..."
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none"
                    ></textarea>
                    <p id="activity-error" class="hidden text-red-500 text-xs mt-1"></p>
                </div>

                <div class="flex gap-3 pt-2">
                    <button
                        id="submit-btn"
                        onclick="submitLog()"
                        class="flex-1 bg-blue-600 text-white px-6 py-2.5 rounded-lg hover:bg-blue-700 font-semibold transition flex items-center justify-center gap-2"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Add Service Log
                    </button>
                    <button
                        onclick="clearForm()"
                        class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 font-semibold transition"
                    >
                        Clear
                    </button>
                </div>

            </div>
        </div>
    </main>

    <script src="{% static 'js/add_log.js' %}"></script>
</body>
</html>
