{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - serbisyongScholar</title>

    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-blue-900 flex flex-col">

    <nav class="bg-white/10 backdrop-blur-md border-b border-white/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="{% url 'home' %}" class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center">
                        <span class="text-blue-900 font-bold text-xl">S</span>
                    </div>
                    <span class="text-white text-xl font-bold">serbisyongScholar</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-2xl w-full animate-fade-in">
            <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 md:p-10 rounded-2xl shadow-2xl">
                
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
                    <p class="text-white/70">Register with your <span class="text-yellow-400">@student.ateneo.edu</span> email</p>
                </div>

                <div id="error" class="hidden mb-6 p-4 bg-red-500/20 border border-red-500/50 text-red-200 text-sm rounded-lg">
                </div>

                <form id="signupForm" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-white/90 mb-2">First Name</label>
                            <input id="first_name" name="first_name" type="text" required 
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                                placeholder="Ignacio">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-white/90 mb-2">Last Name</label>
                            <input id="last_name" name="last_name" type="text" required 
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                                placeholder="de Loyola">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-white/90 mb-2">Student ID</label>
                            <input id="student_id" name="student_id" type="text" required 
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                                placeholder="6-digit ID">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-white/90 mb-2">Username</label>
                            <input id="username" name="username" type="text" required 
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                                placeholder="iggy_1556">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-white/90 mb-2">Ateneo Email</label>
                        <input id="email" name="email" type="email" required 
                            class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                            placeholder="your.name@student.ateneo.edu">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-white/90 mb-2">Password</label>
                            <input id="password" name="password" type="password" required 
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                                placeholder="••••••••">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-white/90 mb-2">Confirm Password</label>
                            <input id="password_confirm" name="password_confirm" type="password" required 
                                class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" 
                        class="w-full py-4 mt-4 bg-yellow-400 hover:bg-yellow-300 text-blue-900 rounded-lg font-bold text-lg shadow-lg transform hover:scale-[1.01] transition-all duration-200">
                        Create Account →
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-white/10 text-center">
                    <p class="text-white/70">
                        Already have an account? 
                        <a href="{% url 'login' %}" class="text-yellow-400 font-semibold hover:underline">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/signup.js' %}"></script>
</body>
</html>
