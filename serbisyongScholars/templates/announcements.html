{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - serbisyongScholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    {% include 'partials/navbar.html' %}
    
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">📢 Announcements</h1>
            <p class="text-gray-600">Stay updated with the latest from OAA</p>
        </div>
        
        <div id="admin-controls" class="hidden mb-6">
            <button onclick="openCreateModal()" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 font-semibold">
                ➕ Create New Announcement
            </button>
        </div>
        
        <div class="bg-white rounded-lg shadow mb-6 p-4">
            <div class="flex gap-2 overflow-x-auto">
                <button onclick="filterByCategory('all')" 
                        class="category-btn active px-4 py-2 rounded-lg bg-blue-600 text-white">
                    All
                </button>
                <button onclick="filterByCategory('URGENT')" 
                        class="category-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
                    Urgent
                </button>
                <button onclick="filterByCategory('VOLUNTEER')" 
                        class="category-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
                    Volunteer Work
                </button>
                <button onclick="filterByCategory('OPPORTUNITY')" 
                        class="category-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
                    Opportunities
                </button>
                <button onclick="filterByCategory('FOOD STUBS')" 
                        class="category-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
                    Food Stubs
                </button>
                <button onclick="filterByCategory('GENERAL')" 
                        class="category-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">
                    General
                </button>
            </div>
        </div>

        <div id="announcements-container" class="space-y-4">
            <div class="text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-gray-500">Loading announcements...</p>
            </div>
        </div>
    </div>
    
    <div id="announcement-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <h2 class="text-2xl font-bold mb-4" id="modal-title">Create Announcement</h2>
                
                <form id="announcement-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
                        <input type="text" id="announcement-title" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" placeholder="Enter announcement title" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                        <select id="announcement-category" 
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="GENERAL">General</option>
                            <option value="URGENT">Urgent</option>
                            <option value="VOLUNTEER">Volunteer Work</option>
                            <option value="FOOD STUBS">Food Stubs</option>
                            <option value="OPPORTUNITY">Opportunity</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Content</label>
                        <textarea id="announcement-content" rows="6" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" placeholder="Enter announcement details..." required></textarea>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">External Link (Optional)</label>
                        <input type="url" id="announcement-link" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" placeholder="https://example.com">
                    </div>
                    
                    <div class="flex gap-3">
                        <button type="submit" 
                                class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 font-semibold">
                            Post Announcement
                        </button>
                        <button type="button" onclick="closeCreateModal()" 
                                class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="{% static 'js/announcements.js' %}"></script>
</body>
</html>
