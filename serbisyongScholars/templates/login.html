{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - serbisyongScholar</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-blue-900 flex flex-col">

    <nav class="bg-white/10 backdrop-blur-md border-b border-white/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="{% url 'home' %}" class="flex items-center space-x-3">
                    <img src="{% static 'img/logo.svg' %}" alt="serbisyongScholar" class="w-10 h-10 rounded-full">
                    <span class="text-white text-xl font-bold">serbisyongScholar</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full animate-fade-in">
            <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl shadow-2xl">
                
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
                    <p class="text-white/70">Sign in to manage your service hours</p>
                </div>

                <div id="error" class="hidden mb-6 p-4 bg-red-500/20 border border-red-500/50 text-red-200 text-sm rounded-lg">
                </div>

                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-white/90 mb-2">Username</label>
                        <input id="username" name="username" type="text" required 
                            class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                            placeholder="Enter your username">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-white/90 mb-2">Password</label>
                        <input id="password" name="password" type="password" required 
                            class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" 
                        class="w-full py-4 bg-yellow-400 hover:bg-yellow-300 text-blue-900 rounded-lg font-bold text-lg shadow-lg transform hover:scale-[1.02] transition-all duration-200">
                        Sign In →
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-white/10 text-center">
                    <p class="text-white/70">
                        No account? 
                        <a href="{% url 'signup' %}" class="text-yellow-400 font-semibold hover:underline">Sign up now</a>
                    </p>
                </div>
            </div>
            
            <p class="text-center mt-8 text-white/40 text-xs">
                © 2026 serbisyongScholar • Office of Admission and Aid
            </p>
        </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
