{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Moderator - serbisyongScholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    {% include 'partials/navbar.html' %}

    <main class="max-w-3xl mx-auto px-4 py-10">
        <div class="bg-white rounded-xl shadow border border-gray-100 p-6 md:p-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Assign Moderator</h1>
            <p class="text-gray-600 mt-2">Set a user as moderator and assign them to an office.</p>

            <form id="assign-form" class="mt-8 space-y-5">
                {% csrf_token %}
                <!-- Hidden field that holds the selected username for submission -->
                <input type="hidden" id="moderator-username" name="moderator-username">

                <div class="relative">
                    <label for="user-search" class="block text-sm font-medium text-gray-700 mb-2">Search User</label>
                    <input
                        id="user-search"
                        type="text"
                        autocomplete="off"
                        placeholder="Type a name or username…"
                        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    >
                    <!-- Dropdown results -->
                    <ul
                        id="user-dropdown"
                        class="hidden absolute z-10 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto"
                    ></ul>
                </div>

                <!-- Selected user info card -->
                <div id="selected-user-card" class="hidden rounded-lg border border-blue-200 bg-blue-50 px-4 py-3 flex items-center justify-between">
                    <div>
                        <p id="selected-name" class="font-semibold text-gray-800"></p>
                        <p id="selected-username" class="text-sm text-gray-500"></p>
                        <p id="selected-email" class="text-sm text-gray-500"></p>
                        <span id="selected-role" class="inline-block mt-1 text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-700"></span>
                    </div>
                    <button type="button" id="clear-user" class="ml-4 text-gray-400 hover:text-red-500 text-xl font-bold leading-none" title="Clear selection">&times;</button>
                </div>

                <div>
                    <label for="office-name" class="block text-sm font-medium text-gray-700 mb-2">Office</label>
                    <select
                        id="office-name"
                        name="office-name"
                        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        required
                    >
                        <option value="">Select an office</option>
                        {% for office in office_choices %}
                            <option value="{{ office }}">{{ office }}</option>
                        {% endfor %}
                    </select>
                    {% if not office_choices %}
                        <p class="mt-2 text-sm text-amber-700">No offices are available yet.</p>
                    {% endif %}
                </div>

                <div class="flex gap-3 pt-2">
                    <button
                        type="submit"
                        id="assign-button"
                        class="bg-blue-600 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition"
                    >
                        Assign Moderator
                    </button>
                    <a
                        href="/api/admin/dashboard/"
                        class="bg-gray-100 text-gray-700 font-semibold px-6 py-2.5 rounded-lg hover:bg-gray-200 transition"
                    >
                        Back to Dashboard
                    </a>
                </div>
            </form>

            <div id="assign-message" class="hidden mt-6 rounded-lg px-4 py-3 text-sm"></div>
        </div>
    </main>

    <script src="{% static 'js/assign_moderator.js' %}?v=2"></script>
</body>
</html>
