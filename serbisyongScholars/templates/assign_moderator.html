{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Moderator - serbisyongScholar</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    {% include 'partials/navbar.html' %}

    <main class="max-w-3xl mx-auto px-4 py-10">
        <div class="bg-white rounded-xl shadow border border-gray-100 p-6 md:p-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Assign Moderator</h1>
            <p class="text-gray-600 mt-2">Set a user as moderator and assign them to an office.</p>

            <form id="assign-form" class="mt-8 space-y-5">
                {% csrf_token %}
                <!-- Hidden field that holds the selected username for submission -->
                <input type="hidden" id="moderator-username" name="moderator-username">

                <div class="relative">
                    <label for="user-search" class="block text-sm font-medium text-gray-700 mb-2">Search User</label>
                    <input
                        id="user-search"
                        type="text"
                        autocomplete="off"
                        placeholder="Type a name or username…"
                        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    >
                    <!-- Dropdown results -->
                    <ul
                        id="user-dropdown"
                        class="hidden absolute z-10 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto"
                    ></ul>
                </div>

                <!-- Selected user info card -->
                <div id="selected-user-card" class="hidden rounded-lg border border-blue-200 bg-blue-50 px-4 py-3 flex items-center justify-between">
                    <div>
                        <p id="selected-name" class="font-semibold text-gray-800"></p>
                        <p id="selected-username" class="text-sm text-gray-500"></p>
                        <p id="selected-email" class="text-sm text-gray-500"></p>
                        <span id="selected-role" class="inline-block mt-1 text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-700"></span>
                        
                        <!-- Demote Button (Visible only if user is already a Moderator) -->
                        <button type="button" id="demote-button" class="hidden mt-3 text-red-600 hover:text-red-700 text-xs font-bold border border-red-200 bg-white px-3 py-1.5 rounded-lg transition flex items-center gap-1">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                            Change back to Scholar
                        </button>
                    </div>
                    <button type="button" id="clear-user" class="ml-4 text-gray-400 hover:text-red-500 text-xl font-bold leading-none" title="Clear selection">&times;</button>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="office-name" class="block text-sm font-medium text-gray-700">Office</label>
                        <button type="button" id="open-office-mgmt" class="text-blue-600 hover:text-blue-800 text-xs font-bold flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            Manage Offices
                        </button>
                    </div>
                    <select
                        id="office-name"
                        name="office-name"
                        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        required
                    >
                        <option value="">Select an office</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-2">
                    <button
                        type="submit"
                        id="assign-button"
                        class="bg-blue-600 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition disabled:bg-blue-300"
                    >
                        Assign Moderator
                    </button>
                    <a
                        href="/dashboard/admin/"
                        class="bg-gray-100 text-gray-700 font-semibold px-6 py-2.5 rounded-lg hover:bg-gray-200 transition"
                    >
                        Back to Dashboard
                    </a>
                </div>
            </form>

            <div id="assign-message" class="hidden mt-6 rounded-lg px-4 py-3 text-sm"></div>
        </div>
    </main>

    <!-- Office Management Modal -->
    <div id="office-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 px-4">
        <div class="bg-white rounded-xl shadow-xl border border-gray-200 w-full max-w-md overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-xl font-bold text-gray-900">Manage Offices</h2>
                <button type="button" id="close-office-modal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            
            <div class="p-6">
                <!-- Add New Office -->
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-office-name" placeholder="New office name..." class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <button type="button" id="add-office-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">Add</button>
                </div>

                <!-- Office List -->
                <div id="office-list-container" class="space-y-2 max-h-64 overflow-y-auto pr-1">
                    <p class="text-sm text-gray-500 text-center py-4">Loading offices...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/assign_moderator.js' %}?v=2"></script>
</body>
</html>
